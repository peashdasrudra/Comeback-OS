<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ PWA ESSENTIAL TAGS — paste ALL of these into your index.html <head> -->

    <!-- App name shown below icon on Android -->
    <title>Comeback</title>

    <!-- Theme color — makes Chrome address bar match your app -->
    <meta name="theme-color" content="#00ff88" />

    <!-- Viewport — essential for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA manifest link — THIS is what Chrome reads for the icon -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon (browser tab) -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-48.png" />

    <!-- Apple / iOS support -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="comeback.io" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="comeback.io" />

    <!-- Description for sharing -->
    <meta name="description" content="Rudra's Ultimate Comeback OS — Thesis, Body, MSc, Life." />

    <!-- CSS Animations & Effects -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap');
      @keyframes glowPulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.2)} }
      @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
      @keyframes fadeIn { from{opacity:0} to{opacity:1} }
      @keyframes slideInLeft { from{opacity:0;transform:translateX(-30px)} to{opacity:1;transform:translateX(0)} }
      @keyframes slideInRight { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
      @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
      @keyframes spin { to{transform:rotate(360deg)} }
      @keyframes confettiBurst { 0%{transform:scale(0);opacity:1} 50%{opacity:1} 100%{transform:scale(3);opacity:0} }
      @keyframes borderGlow { 0%,100%{box-shadow:0 0 5px var(--glow-color)44,0 0 15px var(--glow-color)22} 50%{box-shadow:0 0 15px var(--glow-color)66,0 0 30px var(--glow-color)33} }
      @keyframes textGlow { 0%,100%{text-shadow:0 0 10px currentColor} 50%{text-shadow:0 0 20px currentColor,0 0 40px currentColor} }
      @keyframes progressBar { from{width:0} }
      @keyframes countUp { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
      @keyframes ripple { to{transform:scale(4);opacity:0} }
      @keyframes particleFloat { 0%{transform:translate(0,0) rotate(0deg);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translate(var(--tx),var(--ty)) rotate(360deg);opacity:0} }
      @keyframes heartbeat { 0%,100%{transform:scale(1)} 14%{transform:scale(1.15)} 28%{transform:scale(1)} 42%{transform:scale(1.15)} }
      @keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
      @keyframes scaleIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
      * { -webkit-tap-highlight-color: transparent; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,255,136,0.2); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,255,136,0.4); }
      html { scroll-behavior: smooth; }
      body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    </style>

    <!-- Open Graph (looks good when shared on WhatsApp/FB) -->
    <meta property="og:title" content="comeback.io" />
    <meta property="og:description" content="The Ultimate Comeback OS" />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:type" content="website" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
